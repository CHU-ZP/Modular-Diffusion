experiment_name: mnist_unet_ddpm

data:
  type: mnist
  root: ./data
  image_shape: [1, 28, 28]
  batch_size: 128
  train: true
  download: true
  num_workers: 2

representation:
  type: pixel

model:
  type: unet
  in_channels: 1
  base_channels: 32
  time_embedding_dim: 128

schedule:
  type: linear
  num_timesteps: 1000

diffusion:
  prediction_target: epsilon

loss:
  type: mse

sampler:
  type: ddpm
  clip_x0: true

training:
  epochs: 10
  log_every: 100
  save_every: 1
  optimizer:
    type: adamw
    lr: 0.0001

sampling:
  batch_size: 16
  shape: [16, 1, 28, 28]
