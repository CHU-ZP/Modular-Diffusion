experiment_name: latent_unet_ddim

data:
  type: cifar10
  source: huggingface
  root: ./data
  image_shape: [3, 32, 32]
  batch_size: 128
  train: true
  download: true
  num_workers: 4

representation:
  type: latent
  scaling_factor: 0.18215
  freeze_autoencoder: true
  autoencoder:
    type: diffusers_autoencoder_kl
    pretrained_model_name_or_path: checkpoints/vae/sd-vae-ft-mse
    torch_dtype: float32
    local_files_only: true

model:
  type: unet
  in_channels: 4
  base_channels: 64
  time_embedding_dim: 256

schedule:
  type: cosine
  num_timesteps: 1000

diffusion:
  prediction_target: v

loss:
  type: mse
  weighting: min_snr
  min_snr_gamma: 5.0

sampler:
  type: ddim
  num_steps: 50
  eta: 0.0
  clip_x0: false

training:
  epochs: 100
  log_every: 100
  save_every: 5
  optimizer:
    type: adamw
    lr: 0.0001

sampling:
  batch_size: 16
  shape: [16, 4, 4, 4]
