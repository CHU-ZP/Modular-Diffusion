experiment_name: mnist_mlp_ddpm

data:
  type: mnist
  root: ./data
  image_shape: [1, 28, 28]
  batch_size: 128
  train: true
  download: true
  num_workers: 2

representation:
  type: pixel

model:
  type: mlp
  input_shape: [1, 28, 28]
  hidden_dims: [512, 512]
  time_embedding_dim: 128

schedule:
  type: linear
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02

diffusion:
  prediction_target: epsilon

loss:
  type: mse
  weighting: null

sampler:
  type: ddpm
  clip_x0: true

training:
  epochs: 10
  log_every: 100
  save_every: 1
  optimizer:
    type: adamw
    lr: 0.0001
    weight_decay: 0.0

sampling:
  batch_size: 16
  shape: [16, 1, 28, 28]
