experiment_name: cifar10_unet_cosine

data:
  type: cifar10
  source: huggingface
  root: ./data
  image_shape: [3, 32, 32]
  batch_size: 128
  train: true
  download: true
  num_workers: 4

representation:
  type: pixel

model:
  type: unet
  in_channels: 3
  base_channels: 64
  time_embedding_dim: 256

schedule:
  type: cosine
  num_timesteps: 1000

diffusion:
  prediction_target: epsilon

loss:
  type: mse
  weighting: min_snr
  min_snr_gamma: 5.0

sampler:
  type: ddim
  num_steps: 50
  eta: 0.0
  clip_x0: true

training:
  epochs: 100
  log_every: 100
  save_every: 5
  optimizer:
    type: adamw
    lr: 0.0001
    weight_decay: 0.01

sampling:
  batch_size: 16
  shape: [16, 3, 32, 32]
